<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background-color: blanchedalmond;
        }
        .progress-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            margin: 20px;
            font-family: Exocet,sans-serif;
        }

        .progress-uniques {
            position: relative;
            color: #908858;
        }

        .progress-uniques::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(#908858 ${chronicle.unique.percentage}%, #e0e0e0 0);
            mask: radial-gradient(closest-side, transparent 60%, black 60%);
            z-index: -1;

        }

        .progress-sets {
            position: relative;
            color: #00c400;
        }

        .progress-sets::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(#00c400 ${chronicle.set.percentage}%, #e0e0e0 0);
            mask: radial-gradient(closest-side, transparent 60%, black 60%);
            z-index: -1;

        }

        .progress-runewords {
            position: relative;
            color: #808B96;
        }

        .progress-runewords::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(#808B96 ${chronicle.runeword.percentage}%, #e0e0e0 0);
            mask: radial-gradient(closest-side, transparent 60%, black 60%);
            z-index: -1;

        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        .vertical-container {
            display: table-cell;
            vertical-align: middle;
            text-align: center;
        }

        .stats {
            font-weight: bold;
            font-family: Exocet,sans-serif;
        }
        .latest {
            font-family: Exocet,sans-serif;
        }
    </style>
</head>
<body>
<div class="vertical-container">
    <div class="container">
        <div class="vertical-container">
            <div class="progress-circle progress-uniques">${chronicle.unique.percentage}%</div>
            <div class="stats">${chronicle.uniques}/${chronicle.unique.max}</div>
        </div>

        <div class="vertical-container">
            <div class="progress-circle progress-sets">${chronicle.set.percentage}%</div>
            <div class="stats">${chronicle.setItems}/${chronicle.set.max}</div>
        </div>

        <div class="vertical-container">
            <div class="progress-circle progress-runewords">${chronicle.runeword.percentage}%</div>
            <div class="stats">${chronicle.runewords}/${chronicle.runeword.max}</div>
        </div>
    </div>

    <div class="latest">${chronicle.found} ${chronicle.item} from ${chronicle.monster}</div>
</div>
</body>
</html>
